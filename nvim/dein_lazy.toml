[[plugins]]
repo = 'Vimjas/vim-python-pep8-indent'
on_ft = ['python']

[[plugins]]
repo = 'tell-k/vim-autopep8'
hook_add = '''
  let g:autopep8_disable_show_diff=1
  let g:autopep8_on_save = 1
'''
on_ft = ['python']

[[plugins]]
repo = 'tpope/vim-markdown'
on_ft = ['md']

[[plugins]]
repo ='kannokanno/previm'
hook_add = '''
   autocmd BufRead,BufNewFile *.mkd  set filetype=markdown
   autocmd BufRead,BufNewFile *.md  set filetype=markdown
   nnoremap <silent> <C-p> :PrevimOpen<CR>
   let g:vim_markdown_folding_disabled=1
   let g:previm_enable_realtime = 1
'''
on_ft = ['md']

[[plugins]]
repo = 'vim-scripts/a.vim'
on_ft = ['c', 'cpp']
hook_source = '''
  nnoremap <silent> <leader>aa :A<CR>
  nnoremap <silent> <leader>at :AT<CR>
  nnoremap <silent> <leader>av :AV<CR>
'''

[[plugins]]
repo = 'rhysd/vim-clang-format'
on_ft = 'cpp'
hook_add = """
  function! CPPCodeCleanup()
    let l:lines='all'
    let g:clang_format_fallback_style = 'Google'
    :pyf /usr/share/clang/clang-format-6.0/clang-format.py
  endfunction
  command! CPPCodeCleanup call CPPCodeCleanup()
  autocmd BufWrite *.cpp,*.h,*.cc :CPPCodeCleanup
"""

[[plugins]]
repo = 'cespare/vim-toml'
on_ft = ['toml']

[[plugins]]
repo = 'Shougo/neoinclude.vim'
on_ft = ['c', 'cpp']
depends = ['deoplete.nvim']

[[plugins]]
repo = 'Shougo/neosnippet.vim'
on_i  = 1
on_ft = ['snippet']
depends = ['neosnippet-snippets']
hook_add = '''
  let g:neosnippet#snippets_directory = '$HOME/dotfiles/nvim/snippets/'

  " Plugin key-mappings.
  " Note: It must be "imap" and "smap".  It uses <Plug> mappings.
  imap <C-k>     <Plug>(neosnippet_expand_or_jump)
  smap <C-k>     <Plug>(neosnippet_expand_or_jump)
  xmap <C-k>     <Plug>(neosnippet_expand_target)

  " For conceal markers.
  if has('conceal')
    set conceallevel=2 concealcursor=niv
  endif
'''

[[plugins]]
repo = 'Shougo/neosnippet-snippets'

[[plugins]]
repo = 'mechatroner/rainbow_csv'
on_ft = ['csv']

[[plugins]]
repo = 'fisadev/vim-isort'
hook_add = '''
  autocmd BufWrite *.py :Isort
'''
on_ft = ['python']

[[plugins]]
repo = 'tell-k/vim-autoflake'
hook_add = '''
  let g:autoflake_imports="django,requests,urllib3"
  let g:autoflake_remove_all_unused_imports=1
  let g:autoflake_remove_unused_variables=1
'''
on_ft = ['python']
